name: validate-pcadi-pipeline

on:
  push:
  pull_request:

jobs:
  deterministic-validation:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run synthetic and reference tests
        run: python tests/run_tests.py
